<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsideRP - Gestion Multi-Entreprises</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- CONFIGURATION ---
        const ROLES = { PDG: 'PDG', DRH: 'DRH', EMPLOYE: 'Employé' };

        const COMPANIES = {
            PIER76: {
                id: 'pier76',
                name: 'Pier 76',
                type: 'Garage & Custom',
                description: 'Expertise mécanique et performances haut de gamme.',
                color: 'orange',
                icon: 'Wrench',
                catalog: [
                    { category: 'Performances', name: 'Moteur N5', buy: 12500, sell: 25000 },
                    { category: 'Performances', name: 'Turbo', buy: 4500, sell: 7500 },
                    { category: 'Éléments', name: 'Kit de réparation', buy: 150, sell: 3000 },
                    { category: 'Custom', name: 'Hydraulique', buy: 2000, sell: 5000 },
                    { category: 'Peinture', name: 'Chrome', buy: 1500, sell: 5000 },
                ]
            },
            PONDCAFE: {
                id: 'pondcafe',
                name: 'Pond Café',
                type: 'Restaurant & Bar',
                description: 'Cuisine raffinée et ambiance chaleureuse au bord de l\'eau.',
                color: 'emerald',
                icon: 'Coffee',
                catalog: [
                    { category: 'Nourriture', name: 'Burger', buy: 10, sell: 40 },
                    { category: 'Boissons', name: 'Boisson', buy: 5, sell: 30 },
                    { category: 'Dessert', name: 'Dessert', buy: 8, sell: 30 },
                    { category: 'Alcool', name: 'Vin / Champagne', buy: 30, sell: 100 },
                    { category: 'Services', name: 'Location de table', buy: 0, sell: 1000 },
                ]
            }
        };

        // --- LOGIQUE FISCALE ---
        const calculateSalaryTax = (brut) => {
            if (brut >= 35000) return brut * 0.50;
            if (brut >= 25000) return brut * 0.25;
            if (brut >= 15000) return brut * 0.10;
            return 0;
        };

        const calculateCompanyTax = (profitAfterSalaries) => {
            if (profitAfterSalaries >= 51000) return profitAfterSalaries * 0.30;
            if (profitAfterSalaries >= 31000) return profitAfterSalaries * 0.20;
            if (profitAfterSalaries >= 15000) return profitAfterSalaries * 0.10;
            return 0;
        };

        // --- COMPOSANT ICONE DYNAMIQUE ---
        const Icon = ({ name, ...props }) => {
            const IconComponent = {
                Wrench: () => <i data-lucide="wrench" {...props}></i>,
                Coffee: () => <i data-lucide="coffee" {...props}></i>,
                LayoutDashboard: () => <i data-lucide="layout-dashboard" {...props}></i>,
                Users: () => <i data-lucide="users" {...props}></i>,
                Wallet: () => <i data-lucide="wallet" {...props}></i>,
                PlusCircle: () => <i data-lucide="plus-circle" {...props}></i>,
                LogOut: () => <i data-lucide="log-out" {...props}></i>,
                ChevronRight: () => <i data-lucide="chevron-right" {...props}></i>,
                User: () => <i data-lucide="user" {...props}></i>,
                ShoppingBag: () => <i data-lucide="shopping-bag" {...props}></i>,
                Store: () => <i data-lucide="store" {...props}></i>,
                ArrowLeft: () => <i data-lucide="arrow-left" {...props}></i>,
                AlertCircle: () => <i data-lucide="alert-circle" {...props}></i>,
                Calculator: () => <i data-lucide="calculator" {...props}></i>,
                Sparkles: () => <i data-lucide="sparkles" {...props}></i>,
                TrendingUp: () => <i data-lucide="trending-up" {...props}></i>
            }[name] || (() => null);

            useEffect(() => {
                lucide.createIcons();
            });

            return <IconComponent />;
        };

        // --- APPLICATION PRINCIPALE ---
        function App() {
            const [selectedCompany, setSelectedCompany] = useState(null);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');

            // Données simulées
            const [allSales] = useState([
                { id: 1, companyId: 'pier76', item: 'Moteur N5', seller: 'Momo', price: 25000, date: '28/04/2026' },
                { id: 2, companyId: 'pondcafe', item: 'Burger', seller: 'Sarah', price: 40, date: '28/04/2026' },
            ]);

            const [allEmployees] = useState([
                { id: 1, companyId: 'pier76', name: 'Patron Pier', role: ROLES.PDG, weeklySalary: 40000 },
                { id: 2, companyId: 'pier76', name: 'Momo', role: ROLES.EMPLOYE, weeklySalary: 25000 },
                { id: 3, companyId: 'pondcafe', name: 'Sarah', role: ROLES.PDG, weeklySalary: 35000 },
                { id: 4, companyId: 'pondcafe', name: 'Jean', role: ROLES.EMPLOYE, weeklySalary: 18000 },
            ]);

            const currentSales = useMemo(() => allSales.filter(s => s.companyId === selectedCompany?.id), [allSales, selectedCompany]);
            const currentEmployees = useMemo(() => allEmployees.filter(e => e.companyId === selectedCompany?.id), [allEmployees, selectedCompany]);

            const stats = useMemo(() => {
                if (!selectedCompany || !user) return {};
                const totalSalesRevenue = currentSales.reduce((sum, s) => sum + s.price, 0);
                const totalWeeklySalaries = currentEmployees.reduce((sum, e) => sum + e.weeklySalary, 0);
                const totalMonthlySalaries = totalWeeklySalaries * 4;
                const profitBeforeTax = totalSalesRevenue - totalMonthlySalaries;
                const irsCompanyTax = calculateCompanyTax(profitBeforeTax);
                const irsTotalSalariesTax = currentEmployees.reduce((sum, e) => sum + calculateSalaryTax(e.weeklySalary), 0) * 4;
                const me = currentEmployees.find(e => e.name === user.name);
                const myWeeklySalary = me?.weeklySalary || 0;
                const myTax = calculateSalaryTax(myWeeklySalary);
                const mySales = currentSales.filter(s => s.seller === user.name);
                return {
                    totalSalesRevenue, totalMonthlySalaries, profitBeforeTax,
                    irsCompanyTax, irsTotalSalariesTax, totalDueIRS: irsCompanyTax + irsTotalSalariesTax,
                    myNetSalary: myWeeklySalary - myTax, myTax, myWeeklySalary,
                    mySalesCount: mySales.length, mySalesTotal: mySales.reduce((sum, s) => sum + s.price, 0)
                };
            }, [currentSales, currentEmployees, selectedCompany, user]);

            const handleLogout = () => {
                setUser(null);
                setSelectedCompany(null);
                setView('dashboard');
            };

            // 1. ECRAN DE SELECTION
            if (!selectedCompany) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
                        <div className="mb-16 text-center animate-fade-in">
                            <div className="bg-orange-500/20 p-5 rounded-3xl inline-block mb-6 border border-orange-500/20 shadow-2xl">
                                <Icon name="Store" className="text-orange-500 w-14 h-14" />
                            </div>
                            <h1 className="text-6xl font-black uppercase tracking-tighter mb-4 bg-clip-text text-transparent bg-gradient-to-b from-white to-slate-500">
                                InsideRP Gestion
                            </h1>
                            <p className="text-slate-500 font-medium tracking-widest uppercase">Système Central de Comptabilité</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-5xl w-full">
                            {Object.values(COMPANIES).map(company => (
                                <button key={company.id} onClick={() => setSelectedCompany(company)} className="group relative bg-slate-900/40 border border-slate-800 p-12 rounded-[3rem] hover:border-white/20 transition-all duration-500 text-left overflow-hidden">
                                    <div className={`absolute -top-10 -right-10 opacity-5 group-hover:opacity-10 transition-all duration-700 group-hover:rotate-12`}>
                                        <Icon name={company.icon} className={`w-52 h-52 text-${company.color}-500`} />
                                    </div>
                                    <div className={`w-20 h-20 rounded-2xl flex items-center justify-center mb-10 bg-${company.color}-500/10 text-${company.color}-500 border border-${company.color}-500/30 group-hover:bg-${company.color}-500 group-hover:text-white transition-all`}>
                                        <Icon name={company.icon} className="w-10 h-10" />
                                    </div>
                                    <h2 className="text-4xl font-black text-white tracking-tight mb-2">{company.name}</h2>
                                    <p className={`text-${company.color}-500 text-xs uppercase font-black tracking-widest mb-6`}>{company.type}</p>
                                    <p className="text-slate-500 text-sm leading-relaxed group-hover:text-slate-300">{company.description}</p>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            // 2. ECRAN DE CONNEXION
            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-950">
                        <div className="max-w-md w-full bg-slate-900 border border-slate-800 rounded-[3rem] p-12 shadow-2xl animate-fade-in">
                            <button onClick={() => setSelectedCompany(null)} className="text-slate-600 text-[10px] mb-10 hover:text-white flex items-center gap-2 uppercase font-black tracking-widest">
                                <Icon name="ArrowLeft" /> Revenir au portail
                            </button>
                            <div className="text-center mb-12">
                                <div className={`bg-${selectedCompany.color}-500 w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-2xl`}>
                                    <Icon name={selectedCompany.icon} className="text-white w-12 h-12" />
                                </div>
                                <h1 className="text-4xl font-black text-white uppercase tracking-tighter">{selectedCompany.name}</h1>
                            </div>
                            <div className="space-y-4">
                                {currentEmployees.map(emp => (
                                    <button key={emp.id} onClick={() => setUser(emp)} className="w-full bg-slate-800/30 hover:bg-slate-800 border border-slate-800 p-6 rounded-2xl flex items-center justify-between group transition-all">
                                        <div className="flex items-center gap-5 text-left">
                                            <Icon name="User" className="text-slate-600 group-hover:text-white" />
                                            <div>
                                                <div className="font-bold text-lg text-white">{emp.name}</div>
                                                <div className="text-[9px] uppercase font-black text-slate-500">{emp.role}</div>
                                            </div>
                                        </div>
                                        <Icon name="ChevronRight" className="text-slate-700" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            // 3. APPLICATION
            return (
                <div className="min-h-screen flex text-slate-200">
                    {/* Sidebar */}
                    <div className="w-72 bg-slate-900 border-r border-slate-800 flex flex-col shrink-0 p-8">
                        <div className="flex items-center gap-3 mb-12">
                            <div className={`p-2 rounded-xl bg-${selectedCompany.color}-500 shadow-lg shadow-${selectedCompany.color}-500/20 text-white`}>
                                <Icon name={selectedCompany.icon} />
                            </div>
                            <span className="font-black text-2xl tracking-tighter uppercase">{selectedCompany.name}</span>
                        </div>
                        <nav className="space-y-2 flex-1">
                            {[
                                { id: 'dashboard', label: 'Dashboard', icon: 'LayoutDashboard', roles: [ROLES.PDG, ROLES.DRH, ROLES.EMPLOYE] },
                                { id: 'sales', label: 'Factures', icon: 'PlusCircle', roles: [ROLES.PDG, ROLES.DRH, ROLES.EMPLOYE] },
                                { id: 'employees', label: 'Équipe', icon: 'Users', roles: [ROLES.PDG, ROLES.DRH] },
                                { id: 'finance', label: 'IRS', icon: 'Wallet', roles: [ROLES.PDG] },
                            ].filter(item => item.roles.includes(user.role)).map(item => (
                                <button key={item.id} onClick={() => setView(item.id)} className={`w-full flex items-center gap-3 p-4 rounded-2xl font-bold transition-all ${view === item.id ? `bg-${selectedCompany.color}-500/10 text-${selectedCompany.color}-400 border border-${selectedCompany.color}-500/20` : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <Icon name={item.icon} /> {item.label}
                                </button>
                            ))}
                        </nav>
                        <div className="pt-8 border-t border-slate-800">
                            <button onClick={handleLogout} className="w-full flex items-center justify-center gap-2 p-3 bg-red-500/10 text-red-400 hover:bg-red-500 hover:text-white rounded-xl transition-all font-bold text-sm">
                                <Icon name="LogOut" /> Déconnexion
                            </button>
                        </div>
                    </div>

                    {/* Content */}
                    <main className="flex-1 p-12 overflow-auto bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-900/40 to-transparent">
                        <header className="mb-12">
                            <h2 className="text-6xl font-black text-white uppercase tracking-tighter">{view === 'dashboard' ? 'Tableau de Bord' : view === 'sales' ? 'Ventes' : view === 'employees' ? 'RH' : 'Finance'}</h2>
                        </header>

                        {view === 'dashboard' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 animate-fade-in">
                                <div className="bg-slate-900 p-10 rounded-[3rem] border border-slate-800">
                                    <div className="text-slate-500 text-xs mb-3 font-black uppercase tracking-widest">{user.role === ROLES.EMPLOYE ? 'Ma Paye (Net)' : 'Chiffre d\'Affaires'}</div>
                                    <div className={`text-6xl font-black text-${user.role === ROLES.EMPLOYE ? 'green-400' : 'white'} tracking-tighter`}>{user.role === ROLES.EMPLOYE ? stats.myNetSalary.toLocaleString() : stats.totalSalesRevenue.toLocaleString()} €</div>
                                </div>
                                <div className="bg-slate-900 p-10 rounded-[3rem] border border-slate-800">
                                    <div className="text-slate-500 text-xs mb-3 font-black uppercase tracking-widest">{user.role === ROLES.EMPLOYE ? 'Mes Ventes' : 'Membres'}</div>
                                    <div className="text-6xl font-black text-white tracking-tighter">{user.role === ROLES.EMPLOYE ? stats.mySalesCount : currentEmployees.length}</div>
                                </div>
                                {user.role === ROLES.PDG && (
                                    <div className={`bg-${selectedCompany.color}-500/5 p-10 rounded-[3rem] border border-${selectedCompany.color}-500/20`}>
                                        <div className={`text-${selectedCompany.color}-500/60 text-xs mb-3 font-black uppercase tracking-widest`}>Taxe IRS</div>
                                        <div className={`text-6xl font-black text-${selectedCompany.color}-500 tracking-tighter`}>{stats.totalDueIRS.toLocaleString()} €</div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'sales' && (
                            <div className="max-w-2xl bg-slate-900 p-12 rounded-[3rem] border border-slate-800 animate-fade-in">
                                <div className="space-y-6">
                                    {selectedCompany.catalog.map(item => (
                                        <button key={item.name} className="w-full flex justify-between items-center p-6 bg-slate-950 border border-slate-800 rounded-2xl hover:border-white/20 transition-all">
                                            <div className="text-left">
                                                <div className="text-[10px] uppercase font-black text-slate-600 tracking-widest">{item.category}</div>
                                                <div className="font-bold text-white">{item.name}</div>
                                            </div>
                                            <div className={`text-2xl font-black text-${selectedCompany.color}-500`}>{item.sell.toLocaleString()} €</div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'employees' && (
                            <div className="bg-slate-900 rounded-[3rem] border border-slate-800 overflow-hidden animate-fade-in">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-800/30">
                                        <tr className="text-slate-500 text-[10px] font-black uppercase tracking-widest">
                                            <th className="p-8">Membre</th>
                                            <th className="p-8">Poste</th>
                                            <th className="p-8">Salaire Brut (H)</th>
                                            <th className="p-8 text-right">Salaire Net (H)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800">
                                        {currentEmployees.map(emp => {
                                            const tax = calculateSalaryTax(emp.weeklySalary);
                                            return (
                                                <tr key={emp.id} className="hover:bg-slate-800/20 transition-colors">
                                                    <td className="p-8 font-bold text-white">{emp.name}</td>
                                                    <td className="p-8"><span className="bg-slate-800 px-3 py-1 rounded-lg text-[10px] font-black">{emp.role}</span></td>
                                                    <td className="p-8 font-mono">{emp.weeklySalary.toLocaleString()} €</td>
                                                    <td className={`p-8 text-right font-black text-${selectedCompany.color}-400 text-xl tracking-tighter`}>{(emp.weeklySalary - tax).toLocaleString()} €</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {view === 'finance' && user.role === ROLES.PDG && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 animate-fade-in">
                                <div className="bg-slate-900 p-12 rounded-[3.5rem] border border-slate-800">
                                    <h3 className="text-2xl font-black mb-10 text-white flex items-center gap-3"><Icon name="Calculator" className="text-orange-500" /> Bilan Mensuel</h3>
                                    <div className="space-y-6">
                                        <div className="flex justify-between font-bold"><span className="text-slate-500">Recettes Ventes</span><span>{stats.totalSalesRevenue.toLocaleString()} €</span></div>
                                        <div className="flex justify-between font-bold"><span className="text-slate-500">Salaires (Mois)</span><span className="text-red-500">-{stats.totalMonthlySalaries.toLocaleString()} €</span></div>
                                        <div className={`p-8 rounded-3xl bg-${selectedCompany.color}-500/5 flex justify-between items-center`}>
                                            <span className="font-black uppercase text-xs tracking-widest">Bénéfice</span>
                                            <span className={`text-4xl font-black text-${selectedCompany.color}-400 tracking-tighter`}>{stats.profitBeforeTax.toLocaleString()} €</span>
                                        </div>
                                    </div>
                                </div>
                                <div className={`bg-${selectedCompany.color}-500 p-12 rounded-[3.5rem] text-white shadow-2xl`}>
                                    <h3 className="text-4xl font-black uppercase mb-10">Dette IRS</h3>
                                    <div className="space-y-4 text-xl">
                                        <div className="flex justify-between"><span>Taxe Activité</span><span>{stats.irsCompanyTax.toLocaleString()} €</span></div>
                                        <div className="flex justify-between"><span>Retenues Salaires</span><span>{stats.irsTotalSalariesTax.toLocaleString()} €</span></div>
                                        <div className="h-1 bg-white/20 my-6"></div>
                                        <div className="flex justify-between items-center"><span className="text-xs font-black uppercase tracking-widest">Total à payer</span><span className="text-6xl font-black tracking-tighter">{stats.totalDueIRS.toLocaleString()} €</span></div>
                                    </div>
                                    <button className="w-full bg-slate-950 mt-12 py-6 rounded-[2rem] font-black uppercase tracking-widest hover:scale-105 transition-all">Transférer fonds IRS</button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
